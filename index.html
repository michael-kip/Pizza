<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pizza hub</title>
</head>
<body>
    <section class="makeorder">
        <div class="container">
            <h2>Make your order!</h2>
            <div class="row">
                <div class="col-sm-12">
                    <form action="">
                        <label for="pizza flavors">A list of pizza flavors</label>
                        <select name="" id="">
                           <option value="bbq chicken">BBQ Chicken</option>
                           <option value="beef bbq">Beef BBQ</option>
                           <option value="veggie pizza">Veggie Pizza</option>
                           <option value="pepperoni pizza">Pepperoni</option>
                           <option value="hawaiian pizza">Hawaiian Pizza</option>
                        </select>
                        <label for="select size">Select Size</label>
                        <select name="" id="">
                            <option value="small">Small -- Ksh. 400</option>
                            <option value="medium">Medium -- Ksh. 600</option>
                            <option value="large">Large -- Ksh. 800</option>
                        </select>
                        <label for="favorite crust">Select Crust</label>
                        <select name="" id="">
                            <option value="crispy">Crispy -- Ksh. 100</option>
                            <option value="stuffed">Stuffed --Ksh. 150</option>
                            <option value="gluten-free">Glutten-free -- Ksh. 200</option>
                        </select>
                        <label for="select toppings">Select toppings</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="cheese" value="cheese">
                            <label class="form-check-label" for="cheese">Cheese -- Ksh. 40</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="sausages" value="sausages">
                            <label class="form-check-label" for="sausages">Sausages -- Ksh. 50</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="mushrooms" value="mushrooms">
                            <label class="form-check-label" for="mushrooms">Mushrooms -- Ksh. 30</label>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
